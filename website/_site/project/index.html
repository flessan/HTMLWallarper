<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .card:hover { border-color: #58a6ff; transform: translateY(-5px); transition: all 0.3s; }
    </style>
</head>
<body class="font-sans">
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-xl font-bold text-white">HTML KDE Wallpapers</h1>
        <a href="https://github.com/flessan/html-kde-live-wallpaper" class="text-gray-400 hover:text-white">GitHub Repo</a>
    </nav>
    
    <main class="max-w-6xl mx-auto p-6">
        
<div class="py-12">
    <div class="flex justify-between items-end mb-10">
        <div>
            <h2 class="text-3xl font-bold text-white">Project Gallery</h2>
            <p class="text-gray-400 mt-2">Kumpulan semua live wallpaper yang tersedia di repository.</p>
        </div>
        <span class="bg-blue-900/30 text-blue-400 px-4 py-1 rounded-full text-sm border border-blue-800">
            1 Items
        </span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="group bg-gray-900 border border-gray-800 rounded-xl overflow-hidden hover:border-blue-500 transition-all duration-300 shadow-2xl">
            <div class="relative overflow-hidden aspect-video bg-gray-800">
                <img src="/wallpapers/nightycloud/gambar.png" 
                     alt="nightycloud" 
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                     onerror="this.src='https://via.placeholder.com/400x225?text=Preview+Coming+Soon'">
                
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                    <a href="https://github.com/flessan/HTMLWallarper/tree/main/wallpapers/nightycloud" target="_blank" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-sm">
                        Source Code
                    </a>
                </div>
            </div>

            <div class="p-5">
                <h3 class="text-xl font-bold text-white capitalize">nightycloud</h3>
                <p class="text-gray-500 text-sm mt-1">Folder: <code>/wallpapers/nightycloud</code></p>
                
                <div class="mt-5 pt-4 border-t border-gray-800 flex items-center justify-between">
                    <span class="text-xs text-gray-400">Status: <span class="text-green-500">Ready</span></span>
                    <a href="https://github.com/flessan/html-kde-live-wallpaper/archive/refs/heads/main.zip" class="text-blue-400 hover:text-white text-sm font-medium flex items-center gap-1">
                        Download 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
        
    </div>
</div>
    </main>

    <footer class="p-10 text-center text-sm text-gray-500 border-t border-gray-800 mt-20">
        Dibuat dengan Eleventy & ❤️ untuk komunitas KDE.
    </footer>
</body>
</html>
